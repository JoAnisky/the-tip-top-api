apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
    name: mysqld-exporter
    namespace: monitoring
    labels:
        release: kube-prometheus-stack
spec:
    namespaceSelector:
        matchNames:
            - the-tip-top-api
    selector:
        matchLabels:
            app: mysqld-exporter
    podMetricsEndpoints:
        - path: /metrics
          port: metrics
